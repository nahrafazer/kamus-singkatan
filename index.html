<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamus Singkatan Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans selection:bg-indigo-500 selection:text-white">

    <div class="container mx-auto max-w-6xl px-4 py-8 md:py-12">
        <header class="text-center mb-10 md:mb-14">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent mb-2">
                📖 Kamus Singkatan
            </h1>
            <p class="text-sm md:text-base text-slate-400">Penyimpanan jargon, akronim, dan singkatan kata digital</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
            
            <div class="md:col-span-5 bg-slate-900/60 backdrop-blur-md border border-slate-800 p-6 rounded-2xl shadow-xl sticky top-6">
                <h2 class="text-lg font-bold mb-4 text-indigo-400 flex items-center gap-2">
                    <span>✨</span> Tambah Singkatan
                </h2>
                <form id="formSingkatan" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Singkatan / Akronim</label>
                        <input 
                            type="text" 
                            id="singkatan" 
                            placeholder="Contoh: ASAP" 
                            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 uppercase transition-all placeholder:text-slate-600" 
                            required
                        >
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Kepanjangan / Arti</label>
                        <input 
                            type="text" 
                            id="arti" 
                            placeholder="As Soon As Possible" 
                            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all placeholder:text-slate-600" 
                            required
                        >
                    </div>
                    <button 
                        type="submit" 
                        id="btnSimpan" 
                        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-indigo-600/10 active:scale-[0.98]"
                    >
                        Simpan Data
                    </button>
                </form>
            </div>

            <div class="md:col-span-7 space-y-4 w-full">
                <div class="relative">
                    <input 
                        type="text" 
                        id="search" 
                        placeholder="Cari singkatan atau arti kata..." 
                        class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 pl-12 text-sm md:text-base shadow-lg focus:outline-none focus:border-purple-500 focus:ring-2 focus:
